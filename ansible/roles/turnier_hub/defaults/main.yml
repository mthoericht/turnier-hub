---
turnier_hub_app_user: deploy
turnier_hub_app_group: deploy
turnier_hub_app_dir: /opt/turnier-hub

turnier_hub_repo_url: "git@github.com:YOUR_ORG/turnier-hub.git"
turnier_hub_repo_branch: main

# Process manager options: systemd | pm2 | custom
turnier_hub_process_manager: systemd
turnier_hub_systemd_service: turnier-hub
turnier_hub_manage_systemd_unit: true
turnier_hub_pm2_process_name: turnier-hub
turnier_hub_restart_command: "npm run prod:start"
turnier_hub_healthcheck_enabled: true
turnier_hub_healthcheck_url: "http://127.0.0.1:3001/api/health"
turnier_hub_healthcheck_status: 200
turnier_hub_healthcheck_retries: 12
turnier_hub_healthcheck_delay: 5

# Prisma Studio (optional). Binds to localhost by default — use SSH port forwarding.
turnier_hub_prisma_studio_enabled: false
turnier_hub_manage_prisma_studio_systemd_unit: true
turnier_hub_prisma_studio_systemd_service: turnier-hub-prisma-studio
turnier_hub_prisma_studio_host: "127.0.0.1"
turnier_hub_prisma_studio_port: "5555"

# Provide these in group_vars/all.yml or via --extra-vars.
turnier_hub_env:
  NODE_ENV: production
  PORT: "3001"
  DATABASE_URL: "file:../../data/prod.db"
  JWT_SECRET: "CHANGE_ME"
  INVITE_CODE: "CHANGE_ME"
