---
- name: Install/update main application systemd unit
  ansible.builtin.template:
    src: turnier-hub.service.j2
    dest: "/etc/systemd/system/{{ turnier_hub_systemd_service }}.service"
    owner: root
    group: root
    mode: "0644"
  register: turnier_hub_systemd_app_unit
  when:
    - turnier_hub_process_manager == "systemd"
    - turnier_hub_manage_systemd_unit

- name: Install/update Prisma Studio systemd unit
  ansible.builtin.template:
    src: turnier-hub-prisma-studio.service.j2
    dest: "/etc/systemd/system/{{ turnier_hub_prisma_studio_systemd_service }}.service"
    owner: root
    group: root
    mode: "0644"
  register: turnier_hub_systemd_prisma_unit
  when:
    - turnier_hub_process_manager == "systemd"
    - turnier_hub_prisma_studio_enabled
    - turnier_hub_manage_prisma_studio_systemd_unit

- name: Reload systemd daemon after unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - turnier_hub_process_manager == "systemd"
    - >
      (turnier_hub_systemd_app_unit is defined and turnier_hub_systemd_app_unit.changed)
      or (turnier_hub_systemd_prisma_unit is defined and turnier_hub_systemd_prisma_unit.changed)
