---
- name: Validate deployment inputs
  ansible.builtin.include_tasks: preflight.yml

- name: Ensure application group exists
  ansible.builtin.group:
    name: "{{ turnier_hub_app_group }}"
    state: present

- name: Ensure application user exists
  ansible.builtin.user:
    name: "{{ turnier_hub_app_user }}"
    group: "{{ turnier_hub_app_group }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure application directory exists
  ansible.builtin.file:
    path: "{{ turnier_hub_app_dir }}"
    state: directory
    owner: "{{ turnier_hub_app_user }}"
    group: "{{ turnier_hub_app_group }}"
    mode: "0755"

- name: Manage systemd unit (optional)
  ansible.builtin.include_tasks: systemd.yml

- name: Checkout repository
  ansible.builtin.git:
    repo: "{{ turnier_hub_repo_url }}"
    dest: "{{ turnier_hub_app_dir }}"
    version: "{{ turnier_hub_repo_branch }}"
    update: true
  register: turnier_hub_git_result
  become_user: "{{ turnier_hub_app_user }}"

- name: Install node modules with npm ci
  ansible.builtin.command: npm ci
  args:
    chdir: "{{ turnier_hub_app_dir }}"
  become_user: "{{ turnier_hub_app_user }}"
  when: turnier_hub_git_result.changed

- name: Write server .env file from variables
  ansible.builtin.template:
    src: server.env.j2
    dest: "{{ turnier_hub_app_dir }}/server/.env"
    owner: "{{ turnier_hub_app_user }}"
    group: "{{ turnier_hub_app_group }}"
    mode: "0600"
  register: turnier_hub_env_result

- name: Ensure SQLite data directory exists (repo root data/)
  ansible.builtin.file:
    path: "{{ turnier_hub_app_dir }}/data"
    state: directory
    owner: "{{ turnier_hub_app_user }}"
    group: "{{ turnier_hub_app_group }}"
    mode: "0750"

- name: Apply production database schema
  ansible.builtin.command: npm run db:deploy
  args:
    chdir: "{{ turnier_hub_app_dir }}"
  become_user: "{{ turnier_hub_app_user }}"
  when: turnier_hub_git_result.changed or turnier_hub_env_result.changed

- name: Build production artifacts
  ansible.builtin.command: npm run prod:prepare
  args:
    chdir: "{{ turnier_hub_app_dir }}"
  become_user: "{{ turnier_hub_app_user }}"
  when: turnier_hub_git_result.changed or turnier_hub_env_result.changed
  notify: restart turnier hub

- name: Restart if notified changes exist
  ansible.builtin.meta: flush_handlers

- name: Validate service health after bootstrap
  ansible.builtin.include_tasks: healthcheck.yml
