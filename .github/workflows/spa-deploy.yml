name: Deploy SPA to S3

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment name (for GitHub Environments)"
        required: true
        default: "dev"
      deploy_to_aws:
        description: "Upload build artifacts to S3 via AWS OIDC"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      invalidate_cloudfront:
        description: "Create CloudFront invalidation after upload"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Build and deploy client bundle
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build -w client

      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.deploy_to_aws == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Sync bundle to S3
        if: ${{ inputs.deploy_to_aws == 'true' }}
        run: |
          aws s3 sync client/dist "s3://${{ secrets.AWS_SPA_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          aws s3 cp client/dist/index.html "s3://${{ secrets.AWS_SPA_BUCKET }}/index.html" \
            --cache-control "public,max-age=60"

      - name: Invalidate CloudFront cache
        if: ${{ inputs.deploy_to_aws == 'true' && inputs.invalidate_cloudfront == 'true' && env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
