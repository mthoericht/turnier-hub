name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  test:
    name: Vitest (server + client)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: turnier
          POSTGRES_PASSWORD: turnier
          POSTGRES_DB: turnier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turnier -d turnier_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write server/.env.test for CI
        run: |
          cat <<'EOF' > server/.env.test
          DATABASE_URL=postgresql://turnier:turnier@localhost:5432/turnier_test?schema=public
          JWT_SECRET=ci-jwt-secret-must-be-long-enough-for-sanity-32
          INVITE_CODE=ciinvitecode12
          DEFAULT_SCHOOL_NAME=defaultSchool
          PORT=3002
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
          TRUST_PROXY=false
          RATE_LIMIT_STORE=memory
          LOCKOUT_STORE=memory
          EVENT_BUS=memory
          EOF

      - name: Prepare test database (Prisma)
        run: npm run test:prepare -w server

      - name: Install Playwright Chromium
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Run tests
        run: npm test
