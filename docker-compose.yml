services:
  postgres:
    image: postgres:16-alpine
    container_name: turnier-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnier
      POSTGRES_PASSWORD: turnier
      POSTGRES_DB: turnier_dev
    ports:
      - "5432:5432"
    volumes:
      - turnier-hub-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnier -d turnier_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: turnier-hub-dynamodb-local
    restart: unless-stopped
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - turnier-hub-dynamodb-data:/data
    working_dir: /home/dynamodblocal

volumes:
  turnier-hub-postgres-data:
  turnier-hub-dynamodb-data:
